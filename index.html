<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Collection</title>
    <style>
        :root {
            --primary-green: #7fac8d;
            --soft-gold: #c5a373;
            --bg-cream: #fbf9f5;
            --text-main: #333333;
            --text-light: #888888;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'STSong', '華康明體', 'PingFang SC', serif;
            background-color: var(--bg-cream);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            /* 确保 body 至少占满全屏，方便监听空白处点击 */
            min-height: 100vh;
        }

        .container {
            width: 90%;
            margin: 0 auto;
            padding: 40px 0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            column-gap: 60px;
            row-gap: 50px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .card {
            background: #ffffff;
            border-radius: 4px;
            padding: 30px 20px;
            box-shadow: var(--card-shadow);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            border: 1px solid rgba(0, 0, 0, 0.03);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
        }

        @media (min-width: 769px) {
            .card:hover {
                transform: translateY(-8px);
                box-shadow: 0 20px 40px rgba(127, 172, 141, 0.12);
            }

            .card:hover .shop-name::after {
                width: 48px;
            }
        }

        .card.is-active {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(127, 172, 141, 0.12);
        }

        .card.is-active .shop-name::after {
            width: 48px;
        }

        .platform-tag {
            font-size: 16px;
            color: var(--primary-green);
            background: rgba(127, 172, 141, 0.08);
            padding: 3px 12px;
            border-radius: 20px;
            margin-bottom: 20px;
            letter-spacing: 1px;
            pointer-events: none;
            /* 防止点击标签影响判定 */
        }

        .card img {
            width: 100%;
            max-width: 180px;
            aspect-ratio: 1 / 1;
            margin-bottom: 25px;
            border: 1px solid #f8f8f8;
            padding: 8px;
            background: #fff;
            pointer-events: none;
            /* 防止点击图片影响判定 */
        }

        .shop-name {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
            letter-spacing: 1px;
            pointer-events: none;
        }

        .shop-name::after {
            content: '';
            display: block;
            width: 24px;
            height: 1px;
            background: var(--soft-gold);
            margin: 10px auto;
            transition: width 0.3s;
        }

        .scan-tips {
            font-size: 16px;
            color: var(--text-light);
            margin-top: 5px;
            letter-spacing: 1px;
            pointer-events: none;
        }

        .footer-action {
            margin: 80px auto 40px;
            text-align: center;
            position: relative;
            max-width: 600px;
        }

        .btn-ref {
            font-size: 20px;
            color: var(--soft-gold);
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.8;
        }

        .btn-ref::before,
        .btn-ref::after {
            content: "";
            flex: 1;
            height: 1px;
            background: linear-gradient(to var(--direction, right), transparent, var(--soft-gold));
            margin: 0 20px;
        }

        .btn-ref::after {
            --direction: left;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
                column-gap: 15px;
                row-gap: 20px;
            }

            .shop-name {
                font-size: 20px;
            }

            .container {
                width: 95%;
            }

            .card {
                padding: 20px 10px;
            }

            .footer-action {
                margin: 40px auto 20px;
            }

            .btn-ref {
                font-size: 20px;
                letter-spacing: 4px;
            }
        }
    </style>
</head>

<body onclick="handleGlobalClick(event)">

    <div class="container">
        <div class="grid">
            <div class="card">
                <div class="platform-tag">支付宝小程序</div>
                <img src="./alipay_scan_zfb_huibahuayi.png" alt="支付宝">
                <span class="shop-name">卉霸花艺</span>
                <span class="scan-tips">支付宝扫一扫</span>
            </div>

            <div class="card">
                <div class="platform-tag">美团闪购</div>
                <img src="./wechat_scan_meituan_huayuxianhuadian.png" alt="美团">
                <span class="shop-name">花屿鲜花店</span>
                <span class="scan-tips">微信扫一扫</span>
            </div>

            <div class="card">
                <div class="platform-tag">淘宝闪购</div>
                <img src="./taobao_scan_taobao_relianxianhuadian.png" alt="淘宝">
                <span class="shop-name">热恋鲜花店</span>
                <span class="scan-tips">淘宝扫一扫</span>
            </div>

            <div class="card">
                <div class="platform-tag">美团闪购</div>
                <img src="./wechat_scan_meituan_yuexihuayi.png" alt="美团">
                <span class="shop-name">悦禧花艺</span>
                <span class="scan-tips">微信扫一扫</span>
            </div>

            <div class="card">
                <div class="platform-tag">淘宝闪购</div>
                <img src="./taobao_scan_taobao_moshangxianhuafang.png" alt="淘宝">
                <span class="shop-name">陌上鲜花坊</span>
                <span class="scan-tips">淘宝扫一扫</span>
            </div>

            <div class="card">
                <div class="platform-tag">美团闪购</div>
                <img src="./wechat_scan_meituan_yanhuihuayi.png" alt="美团">
                <span class="shop-name">颜汇花艺</span>
                <span class="scan-tips">微信扫一扫</span>
            </div>
        </div>

        <div class="footer-action">
            <p class="btn-ref">仅供参考</p>
        </div>
    </div>

    <script>
        function handleGlobalClick(event) {
            // 找到点击路径中最近的 .card 元素
            const card = event.target.closest('.card');

            // 情况1：点击的是卡片
            if (card) {
                const isActive = card.classList.contains('is-active');

                // 先清除所有卡片的激活状态
                document.querySelectorAll('.card').forEach(c => c.classList.remove('is-active'));

                // 如果刚才点击的卡片之前没激活，现在激活它
                if (!isActive) {
                    card.classList.add('is-active');
                }

                // 阻止事件冒泡到 body 的其他逻辑
                event.stopPropagation();
            }
            // 情况2：点击的是空白区域（非卡片区域）
            else {
                document.querySelectorAll('.card').forEach(c => c.classList.remove('is-active'));
            }
        }
    </script>

</body>

</html>
